name: "Unlock Environment"
description: "Unlock an environment via SFP Server - designed to never fail the pipeline"
author: "flxbl-io"

branding:
  icon: "anchor"
  color: "green"

inputs:
  environment:
    description: "Name of the environment to unlock"
    required: true
  ticket-id:
    description: "Lock ticket ID obtained from lock operation"
    required: true
  repository:
    description: "Repository name (format: owner/repo)"
    required: false
    default: ${{ github.repository }}
  sfp-server-url:
    description: "URL to the SFP Server instance (e.g., https://your-org.flxbl.io)"
    required: true
  sfp-server-token:
    description: "Token for SFP Server authentication"
    required: true

runs:
  using: "composite"

  steps:
    - name: Print header
      shell: bash
      run: |
        echo "------------------------------------------------------------------------------------------"
        echo "flxbl-actions  -- ❤️  by flxbl.io ❤️  -Version:1.0.0"
        echo "------------------------------------------------------------------------------------------"
        echo "Action      : unlock-environment"
        echo "Environment : ${{ inputs.environment }}"
        echo "Ticket ID   : ${{ inputs.ticket-id }}"
        echo "Repository  : ${{ inputs.repository }}"
        echo "SFP Server  : ${{ inputs.sfp-server-url }}"
        echo "------------------------------------------------------------------------------------------"
        echo ""

    - name: Unlock environment
      shell: bash
      env:
        SFP_SERVER_URL: ${{ inputs.sfp-server-url }}
        SFP_SERVER_TOKEN: ${{ inputs.sfp-server-token }}
      run: |
        # Unlock environment - designed to never fail the pipeline
        echo "Attempting to unlock environment: ${{ inputs.environment }}"

        sfp server environment unlock \
          --name "${{ inputs.environment }}" \
          --repository "${{ inputs.repository }}" \
          --ticket-id "${{ inputs.ticket-id }}" \
        && echo "::notice::Successfully unlocked environment: ${{ inputs.environment }}" \
        || echo "::warning::Failed to unlock environment: ${{ inputs.environment }} (non-blocking)"

        # Always exit successfully to not fail the pipeline
        exit 0
